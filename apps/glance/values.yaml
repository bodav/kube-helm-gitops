replicaCount: 1

image:
  repository: glanceapp/glance
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  host: glance
  paths:
    - path: /
      pathType: Prefix

configMapName: glance-config
