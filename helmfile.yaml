helmDefaults:
  wait: true
  timeout: 300
  createNamespace: true

releases:
  # System
  - name: traefik-dashboard
    namespace: kube-system
    chart: ./system/traefik-dashboard
    labels:
      tier: system

  # Applications
  - name: glance
    namespace: apps
    chart: ./apps/glance
    labels:
      tier: apps
    values:
      - ingress:
          host: glance.kube.home

  # - name: jellyfin
