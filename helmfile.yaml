  #     - ./apps/filebrowser/values.yaml
  #   needs:
  #     - media/jellyfin

  - name: gotify
    namespace: apps
    chart: ./apps/gotify
    labels:
      tier: apps
    values:
      - ingress:
          host: gotify.kube.home

  - name: ollama
    namespace: apps
    chart: ./apps/ollama
    labels:
      tier: apps
    values:
      - ingress:
          host: ollama.kube.home

  - name: open-webui
    namespace: apps
    chart: ./apps/open-webui
    labels:
      tier: apps
    values:
      - ingress:
          host: ai.kube.home
    needs:
      - apps/ollama

  - name: whoami
    namespace: apps
    chart: ./apps/whoami
    labels:
      tier: ops
    values:
      - ingress:
          host: whoami.kube.home
